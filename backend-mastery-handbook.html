  res.status(200).json({
    success: true,
    count: products.length,
    data: products,
  });

// @desc    ดึงสินค้าตาม ID
// @route   GET /api/products/:id
exports.getProduct = async (req, res) => {
  const product = await Product.findById(req.params.id);
  if (!product) {
    return res.status(404).json({
      success: false,
      message: 'ไม่พบสินค้านี้',
    });
  }
  res.status(200).json({ success: true, data: product });

// @route   POST /api/products

  const product = await Product.create(req.body);
  res.status(201).json({ success: true, data: product });
};

// @desc    อัปเดตสินค้า
// @route   PUT /api/products/:id

  const product = await Product.findByIdAndUpdate(
    req.params.id,
    req.body,
    { new: true, runValidators: true }

  if (!product) {
    return res.status(404).json({
      success: false,
      message: 'ไม่พบสินค้านี้',

  }
  res.status(200).json({ success: true, data: product });
};

    });
  }

 * Middleware ที่รับ Zod schema แล้วตรวจสอบ req.body
 * ถ้าไม่ผ่าน → ส่ง 400 พร้อมรายละเอียด Error กลับไป
 * ถ้าผ่าน → แทนที่ req.body ด้วย data ที่ผ่าน validation แล้ว (clean data)
 */
const validate = (schema) => (req, res, next) => {
  const result = schema.safeParse(req.body);

  if (!result.success) {
    const errors = result.error.errors.map((err) => ({
      field: err.path.join('.'),
      message: err.message,
    }));

    return res.status(400).json({
      success: false,
      message: 'ข้อมูลไม่ถูกต้อง',
      errors,
    });
  }

  // แทนที่ body ด้วย data ที่ clean แล้ว
  req.body = result.data;
  next();
};

module.exports = validate;`

const errorHandler = (err, req, res, next) => {
  // clone error info
  let error = { ...err, message: err.message };

  // Log สำหรับ Developer (ไม่ส่งไปให้ User)
  console.error('❌ Error:', err.stack);

  // Mongoose: ID format ไม่ถูกต้อง
  if (err.name === 'CastError') {
    error = new ApiError('ไม่พบข้อมูลที่ต้องการ (Invalid ID)', 404);
  }

  // Mongoose: Duplicate Key
  if (err.code === 11000) {
    const field = Object.keys(err.keyValue).join(', ');
    error = new ApiError(\`ข้อมูลซ้ำในฟิลด์: \${field}\`, 400);
  }

  // Mongoose: Validation Error
  if (err.name === 'ValidationError') {
    const messages = Object.values(err.errors).map((e) => e.message);
    error = new ApiError(messages.join(', '), 400);
  }

  res.status(error.statusCode || 500).json({
    success: false,
    message: error.message || 'เกิดข้อผิดพลาดภายใน Server',
    ...(process.env.NODE_ENV === 'development' && { stack: err.stack }),
  });
};

module.exports = errorHandler;`

const User = require('../models/user.model');
const asyncHandler = require('../utils/asyncHandler');
const ApiError = require('../utils/ApiError');

/**
 * Middleware ตรวจสอบ JWT Token
 * ดึง Token จาก Header: Authorization: Bearer <token>
 */
const protect = asyncHandler(async (req, res, next) => {
  let token;

  // ดึง Token จาก Header
  const authHeader = req.headers.authorization;
  if (authHeader && authHeader.startsWith('Bearer')) {
    token = authHeader.split(' ')[1];
  }

  if (!token) {
    throw new ApiError('กรุณาเข้าสู่ระบบก่อน', 401);
  }

  // Verify Token
  const decoded = jwt.verify(token, process.env.JWT_SECRET);

  // หา User จาก Token payload
  const user = await User.findById(decoded.id);
  if (!user) {
    throw new ApiError('ไม่พบผู้ใช้ที่เชื่อมกับ Token นี้', 401);
  }

  // แนบ user ไว้ใน request เพื่อให้ controller ใช้ต่อ
  req.user = user;
  next();
});

/**
 * Middleware จำกัด Role
 * ใช้ต่อจาก protect เช่น: protect, authorize('admin')
 */
const authorize = (...roles) => {
  return (req, res, next) => {
    if (!roles.includes(req.user.role)) {
      throw new ApiError('คุณไม่มีสิทธิ์เข้าถึงส่วนนี้', 403);
    }
    next();
  };
};

module.exports = { protect, authorize };`

/**
 * Cache Middleware
 * @param {number} ttl - Time to live in seconds (default: 1 ชม.)
 *
 * Flow:
 * 1. สร้าง Cache Key จาก URL (เช่น /api/products)
 * 2. เช็ค Redis → ถ้ามี → ส่ง cached data กลับทันที
 * 3. ถ้าไม่มี → ไปต่อ controller → แต่ดัก res.json() ไว้เพื่อ save cache
 */
const cache = (ttl = 3600) => async (req, res, next) => {
  // ไม่ Cache ถ้าไม่ใช่ GET request
  if (req.method !== 'GET') return next();

  const key = \`cache:\${req.originalUrl}\`;

  try {
    const cached = await redis.get(key);
    if (cached) {
      console.log(\`⚡ Cache HIT: \${key}\`);
      return res.status(200).json(JSON.parse(cached));
    }
  } catch (err) {
    console.warn('⚠️ Cache read error:', err.message);
  }

  // ดัก res.json เพื่อ save cache
  const originalJson = res.json.bind(res);
  res.json = async (data) => {
    try {
      await redis.setex(key, ttl, JSON.stringify(data));
      console.log(\`💾 Cache SET: \${key} (TTL: \${ttl}s)\`);
    } catch (err) {
      console.warn('⚠️ Cache write error:', err.message);
    }
    return originalJson(data);
  };

  next();
};

/**
 * ลบ Cache ที่เกี่ยวข้อง (เรียกหลัง Create/Update/Delete)
 */
const clearCache = (pattern) => async (req, res, next) => {
  try {
    const keys = await redis.keys(\`cache:\${pattern}\`);
    if (keys.length > 0) {
      await redis.del(...keys);
      console.log(\`🗑️ Cache CLEARED: \${keys.length} keys\`);
    }
  } catch (err) {
    console.warn('⚠️ Cache clear error:', err.message);
  }
  next();
};

module.exports = { cache, clearCache };`

                    <h3 class="text-lg font-bold text-white mb-2">${sec.title}</h3>
                    <p class="text-surface-300 text-sm mb-5">${sec.description}</p>
                    <div class="mermaid bg-white/[0.02] rounded-xl p-4 overflow-x-auto">
${sec.mermaid}
                    </div>
                </div>`;

        case 'checklist':
            return `
                <div class="bg-emerald-500/5 border border-emerald-500/15 rounded-2xl p-6">
                    <h3 class="text-lg font-bold text-emerald-400 mb-4">${sec.title}</h3>
                    <div class="space-y-3">
                        ${sec.items.map(item => `
                            <label class="checklist-item flex items-center gap-3 cursor-pointer group">
                                <input type="checkbox" id="chk-${item.id}" onchange="saveChecklist()" class="w-5 h-5 rounded border-2 border-emerald-500/30 bg-transparent text-emerald-500 focus:ring-emerald-500 focus:ring-offset-0 cursor-pointer">
                                <span class="text-surface-200 transition">${item.text}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>`;

        case 'code':
            return `
                <div class="code-block">
                    <div class="flex items-center justify-between bg-surface-800/80 border border-white/5 rounded-t-xl px-4 py-2.5">
                        <div class="flex items-center gap-2">
                            <div class="flex gap-1.5">
                                <span class="w-3 h-3 rounded-full bg-red-500/60"></span>
                                <span class="w-3 h-3 rounded-full bg-yellow-500/60"></span>
                                <span class="w-3 h-3 rounded-full bg-green-500/60"></span>
                            </div>
                            <span class="text-xs text-surface-300/60 font-mono ml-2">${sec.filename}</span>
                        </div>
                        <button onclick="copyCode(this)" class="copy-btn text-xs px-3 py-1 rounded-lg bg-white/5 hover:bg-white/10 text-surface-300 transition">
                            📋 Copy
                        </button>
                    </div>
                    <pre class="!rounded-t-none border border-t-0 border-white/5 bg-surface-950 text-surface-200 font-mono"><code>${escapeHtml(sec.code)}</code></pre>
                </div>`;

        case 'explain':
            return `
                <div class="bg-gradient-to-br from-amber-500/5 to-orange-500/5 border border-amber-500/10 rounded-2xl p-6">
                    <h3 class="text-lg font-bold text-amber-400 mb-3">${sec.title}</h3>
                    <div class="text-surface-200 leading-relaxed space-y-2 [&_strong]:text-white [&_code]:bg-white/10 [&_code]:px-1.5 [&_code]:py-0.5 [&_code]:rounded [&_code]:text-brand-300 [&_code]:text-sm [&_code]:font-mono">${sec.content}</div>
                </div>`;

        default:
            return '';
    }
}

// ───────────── UTILITIES ─────────────
function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyCode(btn) {
    const code = btn.closest('.code-block').querySelector('code').textContent;
    navigator.clipboard.writeText(code).then(() => {
        btn.textContent = '✅ Copied!';
        setTimeout(() => btn.textContent = '📋 Copy', 2000);
    });
}

function goToStep(id) {
    currentStep = id;
    renderSidebar();
    renderContent();
    closeSidebar();
}

function openSidebar() {
    document.getElementById('sidebar').classList.remove('-translate-x-full');
    document.getElementById('sidebar-overlay').classList.remove('hidden');
}

function closeSidebar() {
    document.getElementById('sidebar').classList.add('-translate-x-full');
    document.getElementById('sidebar-overlay').classList.add('hidden');
}

function toggleDark() {
    isDark = !isDark;
    document.documentElement.classList.toggle('dark', isDark);
    document.body.classList.toggle('bg-surface-900', isDark);
    document.body.classList.toggle('text-surface-200', isDark);
    document.body.classList.toggle('bg-white', !isDark);
    document.body.classList.toggle('text-surface-800', !isDark);
    document.getElementById('theme-icon').textContent = isDark ? '🌙' : '☀️';
    document.getElementById('theme-label').textContent = isDark ? 'Dark Mode' : 'Light Mode';
}

function saveChecklist() {
    const checks = {};
    document.querySelectorAll('.checklist-item input').forEach(cb => {
        checks[cb.id] = cb.checked;
    });
    localStorage.setItem('bm-checklist', JSON.stringify(checks));
}

function loadChecklist() {
    try {
        const saved = JSON.parse(localStorage.getItem('bm-checklist') || '{}');
        Object.entries(saved).forEach(([id, checked]) => {
            const el = document.getElementById(id);
            if (el) el.checked = checked;
        });
    } catch {}
}

// ───────────── KEYBOARD NAV ─────────────
document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' && currentStep < steps.length - 1) goToStep(currentStep + 1);
    if (e.key === 'ArrowLeft' && currentStep > 0) goToStep(currentStep - 1);
});

// ───────────── INIT ─────────────
mermaid.initialize({
    startOnLoad: false,
    theme: 'dark',
    themeVariables: {
        primaryColor: '#4f46e5',
        primaryTextColor: '#fff',
        primaryBorderColor: '#6366f1',
        lineColor: '#94a3b8',
        secondaryColor: '#1e293b',
        tertiaryColor: '#0f172a',
    }
});

renderSidebar();
renderContent();

// Load checklist after render
setTimeout(loadChecklist, 100);
</script>

</body>
</html>
